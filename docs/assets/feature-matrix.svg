    <text x="1000" y="374" text-anchor="middle" fill="#0f766e">YES</text>
    <text x="1220" y="374" text-anchor="middle" fill="#94a3b8">-</text>

    <text x="550" y="424" text-anchor="middle" fill="#0f766e">YES</text>
    <text x="780" y="424" text-anchor="middle" fill="#94a3b8">-</text>
    <text x="1000" y="424" text-anchor="middle" fill="#94a3b8">-</text>
    <text x="1220" y="424" text-anchor="middle" fill="#94a3b8">-</text>
