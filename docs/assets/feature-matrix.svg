  <line x1="70" y1="180" x2="1330" y2="180" stroke="#cbd5e1"/>
  <line x1="70" y1="230" x2="1330" y2="230" stroke="#e2e8f0"/>
  <line x1="70" y1="280" x2="1330" y2="280" stroke="#e2e8f0"/>
