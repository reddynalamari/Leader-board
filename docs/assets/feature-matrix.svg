    <text x="780" y="224" text-anchor="middle" fill="#94a3b8">-</text>
    <text x="1000" y="224" text-anchor="middle" fill="#94a3b8">-</text>
    <text x="1220" y="224" text-anchor="middle" fill="#94a3b8">-</text>

